<!DOCTYPE html>
<html>
<head>
<title>Deck of Cards using z-index</title>

<style>
.container {
    position: relative;
    width: 300px;
    height: 250px;
}

/* Common image style */
.container img {
    position: absolute;
    width: 150px;
    border: 2px solid black;
}

/* Individual stacking */
.img1 {
    left: 0px;
    z-index: 1;
}

.img2 {
    left: 20px;
    z-index: 2;
}

.img3 {
    left: 40px;
    z-index: 3;
}

.img4 {
    left: 60px;
    z-index: 4;
}

.img5 {
    left: 80px;
    z-index: 5;
}

.img6 {
    left: 100px;
    z-index: 6;
}

.img8 {
    left: 120px;
    z-index: 7;
}

.img9 {
    left: 140px;
    z-index: 8;
}

.img10 {
    left: 160px;
    z-index: 9;
}

.img11 {
    left: 180px;
    z-index: 10;
}

.img12 {
    left: 200px;
    z-index: 11;
}

.img13 {
    left: 220px;
    z-index: 12;
}

</style>

</head>
<body>

<h3>Deck of Cards Effect using z-index</h3>

<div class="container">
    <img src="img1.png" class="img1">
    <img src="img2.png" class="img2">
    <img src="img3.png" class="img3">
    <img src="img4.png" class="img4">
    <img src="img5.png" class="img5">
    <img src="img6.png" class="img6">
    <img src="img8.png" class="img8">
    <img src="img9.png" class="img9">
    <img src="img10.png" class="img10">
    <img src="img11.png" class="img11">
    <img src="img12.png" class="img12">
    <img src="img13.png" class="img13">
</div>

</body>
</html>
