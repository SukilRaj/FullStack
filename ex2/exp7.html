<!DOCTYPE html>
<html>
<head>
<title>Border Radius Example</title>

<style>
.roundBox {
    width: 300px;
    height:30px;
    background-color: lightcoral;
    padding: 20px;
    border-radius: 25px;
    margin-bottom: 30px;
}

.imageBox {
    width: 200px;
    height: 300px;
    background-image: url("img1.png");
    background-size: cover;
    border-radius: 30px;
}
</style>

</head>
<body>

<h2>QUESTION 7: Border Radius</h2>

<h3>(a) Rounded corners with background color</h3>
<div class="roundBox">
    This paragraph has rounded corners with background color,
    padding, width and height.
</div>

<h3>(b) Rounded corners with background image</h3>
<div class="imageBox"></div>

</body>
</html>
