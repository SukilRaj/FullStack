<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Technical Symposium Registration</title>
  <style>
    /* Simple, minimal form styles */
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, Arial;
      background: #f9fafb;
      color: #111827;
      padding: 32px 16px;
    }

    .form-wrapper {
      max-width: 480px;
      margin: 0 auto;
      background: #ffffff;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
      box-sizing: border-box;
    }

    h2 { margin: 0 0 10px 0; font-size: 18px; }

    label {
      display: block;
      font-size: 13px;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="email"],
    input[type="date"],
    select {
      width: 100%;
      padding: 8px 10px;
      font-size: 14px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      box-sizing: border-box;
      margin-bottom: 12px;
      background: #fff;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 4px rgba(37,99,235,0.06);
    }

    .row { display: flex; gap: 12px; }
    .row .col { flex: 1; }

    .muted { font-size: 12px; color: #6b7280; margin-top: -8px; margin-bottom: 8px; }

    button[type="submit"] {
      background: #2563eb;
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }
    button[type="submit"]:hover { background: #1e40af; }

    /* small screens: stack */
    @media (max-width: 520px) {
      .row { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="form-wrapper" role="region" aria-labelledby="form-heading">
    <h2 id="form-heading">Technical Symposium Registration</h2>

    <form onsubmit="event.preventDefault(); alert('Registered — demo only!');">
      <label for="name">Name</label>
      <input id="name" name="name" type="text" placeholder="Your full name" required>

      <label for="college">College</label>
      <input id="college" name="college" type="text" placeholder="College / University" required>

      <label for="email">Email</label>
      <input id="email" name="email" type="email" placeholder="you@example.com" required>

      <div class="row">
        <div class="col">
          <label for="event">Event</label>
          <select id="event" name="event" required>
            <option>Paper Presentation</option>
            <option>Workshop</option>
            <option>Hackathon</option>
          </select>
        </div>

        <div class="col">
          <label for="date">Date</label>
          <input id="date" name="date" type="date" required>
        </div>
      </div>

      <div class="muted">All fields are required.</div>
      <div style="text-align:right;">
        <button type="submit">Register</button>
      </div>
    </form>
  </div>
</body>
</html>
