<!DOCTYPE html>
<html>
    <head>
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

        <style>
body {
    margin: 20px;
    font-family: 'Poppins', sans-serif;
    color: white;

    background: radial-gradient(circle at top, #111, #000);
    animation: floatBg 6s ease-in-out infinite alternate;
}

@keyframes floatBg {
    from {
        background-position: 0% 0%;
    }
    to {
        background-position: 100% 100%;
    }
}


h2 {
    color: #00ffff;
    font-size: 26px;
    transition: 0.3s;
    text-align: center;

}

h2:hover {
    text-shadow: 0 0 10px #00ffff;
}

p, li {
    font-size: 15px;
    line-height: 1.6;
    transition: 0.3s;
    text-align: center;
}

p:hover, li:hover {
    color: #cccccc;
    transform: translateX(5px);
}
</style>

    </head>
<body>
    <h2>Welcome</h2>
    <p>This is my simple portfolio website.</p>
    <p>Keep it Private...!! until or unless it's youre.. :)</p>
</body>
</html>
