<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;

    background: linear-gradient(
        -45deg,
        #000000,
        #111111,
        #00ffff,
        #000000
    );
    background-size: 600% 600%;
    animation: bgMove 8s ease infinite;
}




h1 {
    margin-top: 20px;
    font-size: 36px;
    letter-spacing: 2px;
    transition: 0.3s;
}

h1:hover {
    color: #00ffff;
    text-shadow: 0 0 15px #00ffff;
}

p {
    font-size: 14px;
    opacity: 0.8;
}
</style>

</head>
<body>
    <h1>My Portfolio</h1>
    <p>Sukil Raj M S</p>
</body>
</html>
