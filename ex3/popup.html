<!DOCTYPE html>
<html>
<head>
  <title>Popup Detection</title>

  <script>
    function testPopup() {
      var popup = window.open(
        "about:blank",
        "popupTest",
        "width=200,height=100"
      );

      if (popup == null || popup.closed || typeof popup.closed == "undefined") {
        window.location.href = "error.html";
      } else {
        popup.document.write("<p>Popup Allowed</p>");
        popup.close();
      }
    }
  </script>
</head>

<body>

  <button onclick="testPopup()">Test Popup</button>

</body>
</html>
