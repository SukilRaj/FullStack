<!DOCTYPE html>
<html>
<head>
<title>Drag and Drop</title>

<style>
li {
  list-style: none;
  padding: 8px;
  border: 1px solid #333;
  margin: 4px;
  width: 180px;
}
</style>
</head>

<body>

<h2>Drag & Drop Premier League Teams</h2>

<ul>
  <li draggable="true">ALICE</li>
  <li draggable="true">BOB</li>
  <li draggable="true">CHARLIE</li>
  <li draggable="true">DIV</li>
  <li draggable="true">EFSILON</li>
</ul>

<script>
let dragged;

document.addEventListener("dragstart", function(e) {
  dragged = e.target;
});

document.addEventListener("dragover", function(e) {
  e.preventDefault();
});

document.addEventListener("drop", function(e) {
  if (e.target.tagName === "LI") {
    e.target.parentNode.insertBefore(dragged, e.target);
  }
});
</script>

</body>
</html>
